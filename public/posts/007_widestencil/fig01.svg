<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <style>
      .grid { stroke:#1e40af; stroke-width:5; opacity:0.95; }
      .guide { stroke:#9ca3af; stroke-width:2.5; stroke-dasharray:8 8; opacity:0.9; }
      .stencil { stroke:#2e7d32; stroke-width:6; }
      .dirarrow { stroke:#c62828; stroke-width:5; fill:none; }
      .center { fill:#e53935; }
      .pt { fill:#2ecc71; stroke:#1b5e20; stroke-width:1.5; }
      .label { font-family: "Times New Roman", Times, serif; font-size: 30px; fill:#111827; }
      .small { font-size: 25px; }
      .title { font-family: "Times New Roman", Times, serif; font-size: 34px; font-weight: 600; fill:#111827; }
      .formula { font-family: "Times New Roman", Times, serif; font-size: 28px; fill:#111827; }
    </style>
  </defs>

  <rect x="0" y="0" width="760" height="760" fill="white"/>

  <text x="380" y="54" text-anchor="middle" class="title">Rotated wide stencil for a directional second derivative</text>

  <line x1="120" y1="120" x2="120" y2="680" class="grid"/>
  <line x1="240" y1="120" x2="240" y2="680" class="grid"/>
  <line x1="360" y1="120" x2="360" y2="680" class="grid"/>
  <line x1="480" y1="120" x2="480" y2="680" class="grid"/>
  <line x1="600" y1="120" x2="600" y2="680" class="grid"/>

  <line x1="60" y1="160" x2="660" y2="160" class="grid"/>
  <line x1="60" y1="280" x2="660" y2="280" class="grid"/>
  <line x1="60" y1="400" x2="660" y2="400" class="grid"/>
  <line x1="60" y1="520" x2="660" y2="520" class="grid"/>
  <line x1="60" y1="640" x2="660" y2="640" class="grid"/>

  <!-- center x = (240,520), x+he = (480,400), x-he = (120,580) -->

  <line x1="120" y1="580" x2="120" y2="640" class="guide"/>
  <line x1="120" y1="580" x2="240" y2="580" class="guide"/>

  <line x1="480" y1="400" x2="480" y2="520" class="guide"/>
  <line x1="480" y1="400" x2="360" y2="400" class="guide"/>

  <line x1="120" y1="580" x2="480" y2="400" class="stencil"/>

  <line x1="240" y1="520" x2="420" y2="430" class="dirarrow" marker-end="url(#arrow-red)"/>

  <circle cx="240" cy="520" r="20" class="center"/>
  <circle cx="120" cy="580" r="22" class="pt"/>
  <circle cx="480" cy="400" r="22" class="pt"/>

  <text x="240" y="560" text-anchor="middle" class="label">x</text>
  <text x="512" y="392" class="label">x + h e</text>
  <text x="58" y="620" class="label">x - h e</text>
  <text x="392" y="470" class="label">e</text>

  <text x="380" y="718" text-anchor="middle" class="formula">
    D²ₑₑu(x) ≈ ( u(x + h e) − 2u(x) + u(x − h e) ) / h²
  </text>
</svg>